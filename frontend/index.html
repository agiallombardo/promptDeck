<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("promptdeck-ui-theme");
          var root = document.documentElement;
          if (t === "light") root.classList.add("light");
          else root.classList.remove("light");
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", t === "light" ? "#f2f4f8" : "#050507");
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#050507" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>promptDeck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
